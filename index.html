<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoCreate Projects Portal</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #0a0a0a;
            color: #fff;
            text-align: center;
            padding: 50px 20px;
        }

        h1 {
            color: #4da6ff;
            margin-bottom: 40px;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .project-card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s, background 0.2s;
        }

        .project-card:hover {
            background: #222;
            transform: translateY(-5px);
            border-color: #4da6ff;
        }

        .project-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .project-desc {
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <h1>공동제작 포털</h1>
    <p style="color: #aaa; margin-bottom: 40px;">원하시는 프로젝트를 선택해주세요.</p>
    <div class="projects">
        <a href="mt32pi/index.html" class="project-card">
            <div class="project-title">MT32-Pi (미디 프로젝트)</div>
            <div class="project-desc">고품질 알루미늄 케이스 및 보드 세트 공동제작</div>
        </a>
        <a href="ippeosuper/index.html" class="project-card">
            <div class="project-title">아이뻐슈퍼 (복각 프로젝트)</div>
            <div class="project-desc">대우전자 아이큐슈퍼 PC 3D 복각 - 준비 중</div>
        </a>
    </div>
</body>

</html>
